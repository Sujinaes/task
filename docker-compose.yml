services:

  db:
    image: postgres:15
    container_name: wpoms_db
    restart: unless-stopped

    environment:
      POSTGRES_DB: wpoms-dev
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 10


  wpoms_admin:
    image: 924982554051.dkr.ecr.ap-south-1.amazonaws.com/backend-repo:${IMAGE_TAG}
    container_name: wpoms_admin
    restart: unless-stopped

    ports:
      - "8001:8081"

    depends_on:
      db:
        condition: service_healthy

    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/wpoms-dev
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres

    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8081/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10


  wpoms_web:
    image: 924982554051.dkr.ecr.ap-south-1.amazonaws.com/frontend-repo:${IMAGE_TAG}
    container_name: wpoms_web
    restart: unless-stopped

    ports:
      - "8002:5173"

    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL}

    depends_on:
      - wpoms_admin


volumes:
  postgres_data: