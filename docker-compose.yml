version: "3.8"

services:
  wpoms_admin:
    build: ./wpoms_admin
    container_name: wpoms_admin
    ports:
      - "8001:8081"

  wpoms_web:
    build: ./wpoms_web
    container_name: wpoms_web
    ports:
      - "8002:8081"
  db:
    image: postgres:15
    container_name: wpoms_db
    environment:
      POSTGRES_DB: wpoms-dev
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"