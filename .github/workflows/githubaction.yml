name: Build and Push to ECR

on:
  push:
    branches:
      - main

concurrency:
  group: production-deploy
  cancel-in-progress: true

jobs:

  build-and-push:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: true
      matrix:
        include:
          - repo: backend-repo
            path: wpoms_admin
          - repo: frontend-repo
            path: wpoms_web

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPO: ${{ matrix.repo }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPO:$IMAGE_TAG ${{ matrix.path }}

      - name: Push Image (immutable only)
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPO: ${{ matrix.repo }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker push $ECR_REGISTRY/$ECR_REPO:$IMAGE_TAG

      - name: Verify push
        run: |
          aws ecr describe-images \
            --repository-name ${{ matrix.repo }} \
            --image-ids imageTag=${{ github.sha }}

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Copy deploy script to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "scripts/deploy.sh"
          target: "/home/ec2-user"
          strip_components: 1

      - name: Run deploy script on EC2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            chmod +x /home/ec2-user/deploy.sh
            /home/ec2-user/deploy.sh \
              "${{ secrets.AWS_REGION }}" \
              "${{ secrets.AWS_ACCOUNT_ID }}" \
              "${{ github.sha }}"

      - name: Verify deployment
        run: |
          for i in {1..5}; do
            if curl -fsS "http://${{ secrets.EC2_HOST }}:8002/" > /dev/null; then
              echo "Deployment verified: frontend is responding."
              exit 0
            fi
            echo "Attempt $i failed, retrying in 10s..."
            sleep 10
          done
          echo "Deployment verification failed after 5 attempts."
          exit 1